<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 - Live Bracket Tracker</title>
<meta name="description" content="Live World Cup 2026 bracket tracker. Follow the knockout stage with live scores, full bracket tree, and match details. Free, fast, no ads.">
<meta property="og:title" content="FIFA World Cup 2026 - Live Bracket Tracker">
<meta property="og:description" content="48 teams. Live knockout bracket, scores, and match details. Free and fast.">
<link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="container">
  <header>
    <h1>FIFA World Cup 2026</h1>
    <p class="subtitle">Live Bracket Tracker</p>
    <div class="meta-row">
      <span id="tournamentStatus"></span>
    </div>
  </header>

  <div class="summary-bar" id="summaryBar"></div>

  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="live">Live</button>
    <button class="tab-btn" data-tab="bracket">Bracket</button>
    <button class="tab-btn" data-tab="schedule">Schedule</button>
    <button class="tab-btn" data-tab="groups">Groups</button>
  </nav>

  <main>
    <div class="tab-content active" id="tab-live"></div>
    <div class="tab-content" id="tab-bracket"></div>
    <div class="tab-content" id="tab-schedule"></div>
    <div class="tab-content" id="tab-groups"></div>
  </main>

  <footer>
    <p>Built by <a href="https://www.linkedin.com/in/kgnmzn/" target="_blank">Karthikeyan Gopal</a> · <a href="https://github.com/csekeyan/fifa-wc-2026" target="_blank">Open Source on GitHub</a></p>
    <p class="disclaimer">Data refreshes every 30 minutes. Not affiliated with FIFA.</p>
  </footer>
</div>
<script type="module" src="./js/app.js"></script>
</body>
</html>
